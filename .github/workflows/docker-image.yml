name: Build and publish Docker image

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  # Único repositório privado compartilhado pelas aplicações.
  IMAGE_NAME: velozacademy/ecossistema_veloz

  # Tag exclusiva desta aplicação.
  IMAGE_TAG: gestao-estoque

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile

          # Pull requests somente validam o build.
          push: ${{ github.event_name != 'pull_request' }}

          # O servidor Dokploy é linux/x86_64.
          platforms: linux/amd64

          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
